workflows:
  ios-release:
    name: 하냥냥 iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - Appstore
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hanyangnyang.app
      node: latest
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up push capabilities
        script: |
          # 0. Decode GoogleService-Info.plist from base64 environment variable
          echo "$GOOGLE_SERVICE_INFO_BASE64" | base64 -D > ios/App/App/GoogleService-Info.plist
          
          # 1. Create entitlements file
          cat <<EOF > ios/App/App/App.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>aps-environment</key>
              <string>production</string>
          </dict>
          </plist>
          EOF
          
          # 2. Add CODE_SIGN_ENTITLEMENTS and GoogleService-Info.plist to project using Ruby
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/App/App.xcodeproj')
          
          # Add Entitlements
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
            end
          end
          
          # Add GoogleService-Info.plist to Resource Build Phase
          target = project.targets.find { |t| t.name == 'App' } || project.targets.first
          group = project.main_group.find_subpath('App', true)
          file_name = 'GoogleService-Info.plist'
          
          unless group.files.any? { |f| f.path == file_name }
            file_ref = group.new_file(file_name)
            target.add_resources([file_ref])
            puts 'GoogleService-Info.plist linked successfully.'
          else
            puts 'GoogleService-Info.plist is already linked.'
          end
          
          project.save
          "
      - name: Pod install
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        # Codemagic이 원격으로 애플 서버에서 인증서와 배포 프로파일을 자동으로 발급/갱신합니다.
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          # TestFlight의 최신 빌드 번호를 동적으로 가져와서 1씩 차례대로 증가시킵니다.
          # (가져오는 데 실패할 경우를 대비해 기존 BUILD_NUMBER를 폴백으로 사용)
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number 2>/dev/null || echo "")
          if ! [[ "$LATEST_BUILD" =~ ^[0-9]+$ ]]; then
            LATEST_BUILD=$BUILD_NUMBER
          fi
          BUILD_NO=$(($LATEST_BUILD + 1))
          
          # 만료된 빌드 50번으로 인한 중복 에러를 방지하기 위해 최소 빌드 번호 51 강제 보정
          if [ "$BUILD_NO" -le 50 ]; then
            BUILD_NO=51
          fi
          
          # agvtool을 사용하여 Xcode 프로젝트의 빌드 번호를 업데이트합니다.
          cd ios/App
          agvtool new-version -all $BUILD_NO
          cd ../..
          
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # 한글 이름 대신 API 안정성이 높은 영문 이름으로 매칭했습니다.
        beta_groups:
          - alpha-test
      email:
        recipients:
          - yaeunjess@gmail.com
        notify:
          success: true
          failure: true