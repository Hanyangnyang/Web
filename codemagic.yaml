workflows:
  ios-release:
    name: 하냥냥 iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hanyangnyang.app
      node: latest
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Pod install
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        # 💡 [변경 포인트 1] 수동 대신 Codemagic 자동 서명 엔진을 사용하도록 옵션 추가
        script: xcode-project use-profiles --auth automatic
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          # 💡 [변경 포인트 2] 한글 그룹명은 API 연동 시 씹힐 수 있으므로 영문 변경 권장
          # (App Store Connect -> TestFlight 페이지 좌측의 그룹 이름도 똑같이 'alpha-test'로 바꿔주세요!)
          - alpha-test
      email:
        recipients:
          - yaeunjess@gmail.com
        notify:
          success: true
          failure: true