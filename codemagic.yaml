workflows:
  ios-release:
    name: 하냥냥 iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hanyangnyang.app
      node: latest
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up push capabilities
        script: |
          # 1. Create entitlements file
          cat <<EOF > ios/App/App/App.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>aps-environment</key>
              <string>production</string>
          </dict>
          </plist>
          EOF
          
          # 2. Add CODE_SIGN_ENTITLEMENTS to project using Ruby
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/App/App.xcodeproj')
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
            end
          end
          project.save
          "
      - name: Pod install
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        # Codemagic이 원격으로 애플 서버에서 인증서와 배포 프로파일을 자동으로 발급/갱신합니다.
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # 한글 이름 대신 API 안정성이 높은 영문 이름으로 매칭했습니다.
        beta_groups:
          - alpha-test
      email:
        recipients:
          - yaeunjess@gmail.com
        notify:
          success: true
          failure: true